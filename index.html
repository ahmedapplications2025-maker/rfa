<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رافع الملفات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent-dim: #3d3580;
    --text: #e8e6f0;
    --muted: #5a5870;
    --success: #4ade80;
    --error: #f87171;
    --warn: #fbbf24;
    --radius: 12px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,106,247,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(124,106,247,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 60px;
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
  }

  header { text-align: center; display: flex; flex-direction: column; gap: 6px; }
  header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: #fff; }
  header p { font-size: 13px; color: var(--muted); }

  .mode-toggle {
    width: 100%;
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    gap: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .mode-btn.active { background: var(--accent); color: #fff; }
  .mode-btn:not(.active):hover { color: var(--text); background: var(--border); }

  .expiry-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    flex-wrap: wrap;
  }

  .expiry-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .expiry-options { display: flex; gap: 6px; flex-wrap: wrap; }

  .expiry-opt {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  .expiry-opt.active {
    border-color: var(--warn);
    color: var(--warn);
    background: rgba(251,191,36,0.08);
  }

  .info-note {
    width: 100%;
    background: rgba(124,106,247,0.06);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .info-note b { color: var(--text); }

  .dropzone {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    position: relative;
  }

  .dropzone:hover, .dropzone.over { border-color: var(--accent); background: #14141f; }

  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .dz-icon { font-size: 34px; margin-bottom: 10px; display: block; }
  .dz-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .dz-sub { font-size: 12px; color: var(--muted); }

  .file-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
  }

  .file-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
    direction: ltr;
    text-align: right;
  }

  .file-item .size { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .file-item .status { font-size: 18px; line-height: 1; }

  .file-item .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 4px;
  }
  .file-item .remove-btn:hover { color: var(--error); }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-wrap.active { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.2s;
  }

  .upload-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .upload-btn:disabled { background: var(--accent-dim); cursor: not-allowed; opacity: 0.6; }
  .upload-btn:not(:disabled):active { opacity: 0.88; }

  .results-section { width: 100%; display: flex; flex-direction: column; gap: 10px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .copy-all-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .copy-all-btn:active { opacity: 0.7; }

  .links-container {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .link-line { display: flex; align-items: flex-start; gap: 10px; }
  .link-num { color: var(--accent); font-size: 11px; min-width: 22px; text-align: right; flex-shrink: 0; padding-top: 2px; }
  .link-url {
    color: #a5f3fc;
    flex: 1;
    word-break: break-all;
    font-family: monospace;
    font-size: 12px;
    direction: ltr;
    text-align: left;
  }
  .link-copy { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px; flex-shrink: 0; }
  .link-copy:hover { color: var(--accent); }
  .link-copy.copied { color: var(--success); }

  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    background: rgba(124,106,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.25);
  }
  .mode-badge.temp {
    background: rgba(251,191,36,0.1);
    color: var(--warn);
    border-color: rgba(251,191,36,0.25);
  }

  .err-msg { font-size: 12px; color: var(--error); padding: 4px 0; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e2e;
    border: 1px solid var(--accent-dim);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    z-index: 99;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>📁 رافع الملفات</h1>
    <p>ارفع عدة ملفات واحصل على روابط مباشرة فوراً</p>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btnPermanent" onclick="setMode('permanent')">♾️ دائم</button>
    <button class="mode-btn" id="btnTemp" onclick="setMode('temp')">⏳ مؤقت</button>
  </div>

  <div class="expiry-row" id="expiryRow" style="display:none;">
    <span class="expiry-label">ينتهي بعد:</span>
    <div class="expiry-options">
      <button class="expiry-opt active" data-val="1" onclick="setExpiry(this,'1')">يوم</button>
      <button class="expiry-opt" data-val="7" onclick="setExpiry(this,'7')">أسبوع</button>
      <button class="expiry-opt" data-val="14" onclick="setExpiry(this,'14')">أسبوعين</button>
      <button class="expiry-opt" data-val="30" onclick="setExpiry(this,'30')">شهر</button>
    </div>
  </div>

  <div class="info-note" id="infoNote">
    🗄️ <b>دائم:</b> يُرفع على <b>0x0.st</b> — روابط مباشرة بدون انتهاء · حد أقصى 512MB
  </div>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" multiple>
    <span class="dz-icon">☁️</span>
    <div class="dz-title">اسحب الملفات هنا أو اضغط للاختيار</div>
    <div class="dz-sub" id="dzSub">يدعم أي نوع ملف · حد أقصى 512MB</div>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <button class="upload-btn" id="uploadBtn" disabled>ابدأ الرفع</button>

  <div class="results-section" id="resultsSection" style="display:none;">
    <div class="results-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="linksCount">الروابط الناتجة</span>
        <span class="mode-badge" id="modeBadge">♾️ دائم</span>
      </div>
      <button class="copy-all-btn" id="copyAllBtn">نسخ الكل</button>
    </div>
    <div class="links-container" id="linksBox"></div>
    <div class="err-msg" id="errMsg"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const dropzone      = document.getElementById('dropzone');
  const fileInput     = document.getElementById('fileInput');
  const fileListEl    = document.getElementById('fileList');
  const uploadBtn     = document.getElementById('uploadBtn');
  const progressWrap  = document.getElementById('progressWrap');
  const progressBar   = document.getElementById('progressBar');
  const resultsSection= document.getElementById('resultsSection');
  const linksBox      = document.getElementById('linksBox');
  const linksCount    = document.getElementById('linksCount');
  const copyAllBtn    = document.getElementById('copyAllBtn');
  const errMsg        = document.getElementById('errMsg');
  const toast         = document.getElementById('toast');
  const expiryRow     = document.getElementById('expiryRow');
  const modeBadge     = document.getElementById('modeBadge');
  const infoNote      = document.getElementById('infoNote');
  const dzSub         = document.getElementById('dzSub');

  let selectedFiles = [];
  let uploadedLinks = [];
  let currentMode   = 'permanent';
  let currentExpiry = '1';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnPermanent').classList.toggle('active', mode === 'permanent');
    document.getElementById('btnTemp').classList.toggle('active', mode === 'temp');
    expiryRow.style.display = mode === 'temp' ? 'flex' : 'none';
    if (mode === 'permanent') {
      infoNote.innerHTML = '🗄️ <b>دائم:</b> يُرفع على <b>0x0.st</b> — روابط مباشرة بدون انتهاء · حد أقصى 512MB';
      dzSub.textContent = 'يدعم أي نوع ملف · حد أقصى 512MB';
    } else {
      infoNote.innerHTML = '⏳ <b>مؤقت:</b> يُرفع على <b>file.io</b> — الرابط يُحذف عند انتهاء المدة · حد أقصى 2GB';
      dzSub.textContent = 'يدعم أي نوع ملف · حد أقصى 2GB';
    }
  }

  function setExpiry(btn, val) {
    currentExpiry = val;
    document.querySelectorAll('.expiry-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(files) {
    for (const f of files) {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size))
        selectedFiles.push(f);
    }
    renderFileList();
  }

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFileList() {
    fileListEl.innerHTML = '';
    for (let i = 0; i < selectedFiles.length; i++) {
      const f = selectedFiles[i];
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <span class="status" id="st-${i}">📄</span>
        <span class="name">${esc(f.name)}</span>
        <span class="size">${formatSize(f.size)}</span>
        <button class="remove-btn" onclick="removeFile(${i})">✕</button>
      `;
      fileListEl.appendChild(div);
    }
    uploadBtn.disabled = selectedFiles.length === 0;
  }

  function removeFile(i) {
    selectedFiles.splice(i, 1);
    renderFileList();
  }

  uploadBtn.addEventListener('click', startUpload);

  async function startUpload() {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;
    uploadedLinks = [];
    errMsg.textContent = '';
    resultsSection.style.display = 'flex';
    linksBox.innerHTML = '';
    progressWrap.classList.add('active');
    progressBar.style.width = '0%';

    if (currentMode === 'permanent') {
      modeBadge.textContent = '♾️ دائم';
      modeBadge.className = 'mode-badge';
    } else {
      const lbl = {'1':'يوم','7':'أسبوع','14':'أسبوعين','30':'شهر'}[currentExpiry];
      modeBadge.textContent = '⏳ ' + lbl;
      modeBadge.className = 'mode-badge temp';
    }

    const total = selectedFiles.length;
    let done = 0;
    const errors = [];

    for (let i = 0; i < selectedFiles.length; i++) {
      const f = selectedFiles[i];
      setStatus(i, '⏳');
      try {
        const url = currentMode === 'permanent'
          ? await upload0x0(f)
          : await uploadFileIo(f, currentExpiry);
        uploadedLinks.push({ name: f.name, url });
        setStatus(i, '✅');
      } catch (e) {
        errors.push(f.name + ': ' + e.message);
        setStatus(i, '❌');
        uploadedLinks.push({ name: f.name, url: null });
      }
      done++;
      progressBar.style.width = (done / total * 100) + '%';
      renderLinks();
    }

    if (errors.length) errMsg.textContent = 'فشل: ' + errors.join(' | ');
    uploadBtn.disabled = false;
  }

  async function upload0x0(file) {
    const form = new FormData();
    form.append('file', file);
    let res;
    try { res = await fetch('https://0x0.st', { method: 'POST', body: form }); }
    catch { throw new Error('تعذّر الاتصال بـ 0x0.st'); }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = (await res.text()).trim();
    if (!text.startsWith('http')) throw new Error(text || 'رد غير متوقع');
    return text;
  }

  async function uploadFileIo(file, days) {
    const form = new FormData();
    form.append('file', file);
    let res;
    try { res = await fetch('https://file.io/?expires=' + days + 'd', { method: 'POST', body: form }); }
    catch { throw new Error('تعذّر الاتصال بـ file.io'); }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.success || !json.link) throw new Error(json.message || 'رد غير متوقع');
    return json.link;
  }

  function setStatus(i, icon) {
    const el = document.getElementById('st-' + i);
    if (el) el.textContent = icon;
  }

  function renderLinks() {
    linksBox.innerHTML = '';
    let num = 0;
    for (const item of uploadedLinks) {
      if (!item.url) continue;
      num++;
      const row = document.createElement('div');
      row.className = 'link-line';
      const safeUrl = item.url.replace(/'/g, '');
      row.innerHTML = `
        <span class="link-num">${num}.</span>
        <span class="link-url">${esc(item.url)}</span>
        <button class="link-copy" onclick="copyLink(this,'${safeUrl}')">⎘</button>
      `;
      linksBox.appendChild(row);
    }
    const ok = uploadedLinks.filter(x => x.url).length;
    linksCount.textContent = ok + ' رابط ناتج';
    resultsSection.style.display = ok > 0 ? 'flex' : 'none';
  }

  function copyLink(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.classList.add('copied');
      btn.textContent = '✓';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
    });
  }

  copyAllBtn.addEventListener('click', () => {
    const links = uploadedLinks.filter(x => x.url).map((x, i) => (i+1) + '. ' + x.url).join('\n');
    if (!links) return;
    navigator.clipboard.writeText(links).then(() => showToast('تم نسخ كل الروابط ✓'));
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
